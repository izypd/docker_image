name: ECR
run-name: ${{ github.event.inputs.source_image }}

on:
  workflow_dispatch:
    inputs:
      source_image:
        description: '源镜像地址 (例如: nginx:latest 或 quay.io/libpod/alpine:latest)'
        required: true
        type: string

permissions:
  id-token: write # 必须：用于 OIDC 交换

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1 # ECR Public 管理操作必须在 us-east-1 执行

      - name: Login to Amazon ECR Public
        id: login-ecr-public
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: public

      - name: Pull and Push
        env:
          SOURCE_IMAGE: ${{ github.event.inputs.source_image }}
          REGISTRY_URL: ${{ steps.login-ecr-public.outputs.registry }}
          REGISTRY_ALIAS: ${{ secrets.AWS_PUBLIC_ECR_ALIAS }}
        run: |
          if [[ "$SOURCE_IMAGE" == *":"* ]]; then
            IMAGE_TAG="${SOURCE_IMAGE##*:}"           # 取最后一个冒号后面的部分
            IMAGE_WITHOUT_TAG="${SOURCE_IMAGE%:*}"    # 剥离 Tag 部分
            REPO_NAME="${IMAGE_WITHOUT_TAG##*/}"      # 取最后一个斜杠后面的部分
          else
            IMAGE_TAG="latest"
            REPO_NAME="${SOURCE_IMAGE##*/}"
          fi

          TARGET_IMAGE="$REGISTRY_URL/$REGISTRY_ALIAS/$REPO_NAME:$IMAGE_TAG"

          # 打印调试信息，让 CI 日志一目了然
          echo "=== 解析结果 ==="
          echo "源镜像:   $SOURCE_IMAGE"
          echo "仓库名:   $REPO_NAME"
          echo "标签:     $IMAGE_TAG"
          echo "目标镜像: $TARGET_IMAGE"
          echo "================"

          # 1. 检查是否存在，不存在则创建
          if ! aws ecr-public describe-repositories --repository-names "$REPO_NAME" --region us-east-1 > /dev/null 2>&1; then
            echo "未发现仓库 [$REPO_NAME]，正在创建..."
            aws ecr-public create-repository --repository-name "$REPO_NAME" --region us-east-1

            # 2. 轮询等待逻辑
            echo "等待仓库创建成功确认..."
            MAX_RETRIES=10
            COUNT=0
            until aws ecr-public describe-repositories --repository-names "$REPO_NAME" --region us-east-1 > /dev/null 2>&1
            do
              ((COUNT++))
              if [ $COUNT -ge $MAX_RETRIES ]; then
                echo "错误：等待仓库创建超时。"
                exit 1
              fi
              echo "等待中... ($COUNT/$MAX_RETRIES)"
              sleep 2
            done
            echo "仓库 [$REPO_NAME] 已就绪！"
          else
            echo "仓库 [$REPO_NAME] 已存在，跳过创建步骤。"
          fi

          # 3. 镜像同步
          echo "开始拉取和推送镜像..."

          docker pull "$SOURCE_IMAGE"
          docker tag "$SOURCE_IMAGE" "$TARGET_IMAGE"
          docker push "$TARGET_IMAGE"

          echo "🎉 同步完成：$TARGET_IMAGE"
